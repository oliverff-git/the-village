name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install API deps
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (ruff) & Format check (black)
        working-directory: apps/api
        run: |
          ruff .
          black --check .
      - name: Tests (pytest + coverage)
        working-directory: apps/api
        run: |
          pytest -q --cov=. --cov-report=xml
      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-xml
          path: apps/api/coverage.xml

  web-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - name: Install & build web
        run: |
          pnpm install
          pnpm --filter web build
      - name: Unit tests (vitest)
        run: pnpm --filter web test -- --run

  e2e:
    needs: [api-python, web-node]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - name: Install web deps
        run: pnpm install
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Start services via docker compose
        run: docker compose up -d postgres redis minio api web
      - name: E2E smoke
        run: pnpm --filter web test:e2e
      - name: Teardown
        if: always()
        run: docker compose down -v
